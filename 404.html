<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grim VPN — 404</title>
<link rel="icon" href="grimlogo.png" type="image/png">
<style>
@font-face {
    font-family: 'Srift';
    src: url('./Srift.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
}
html,body{
height:100%;
font-family:'Srift', Arial, sans-serif;
color:white;
overflow-x:hidden;
user-select:none;
}
html, body {
    scrollbar-width: none !important;
    -ms-overflow-style: none !important;
    overflow-y: scroll !important;
}
html::-webkit-scrollbar, body::-webkit-scrollbar, *::-webkit-scrollbar {
    display: none !important;
}
body{
background:url("fon.png") center/cover no-repeat fixed;
}
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}
.error-wrapper{
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
flex-direction:column;
padding:20px;
}
.error-wrapper h1{
    font-family: Arial, Helvetica, sans-serif !important;
    font-size:180px;
    line-height:1;
    font-weight:900;
    letter-spacing:-10px;
    text-shadow:0 0 60px rgba(0,198,255,0.6);
    margin-bottom:20px;
    color:#00c6ff;
}
.error-wrapper h2{
font-size:42px;
margin-bottom:16px;
}
.error-wrapper p{
font-size:22px;
max-width:520px;
margin:0 auto 40px;
opacity:0.9;
line-height:1.5;
}
.home-btn{
display:inline-block;
padding:18px 48px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:18px;
font-weight:bold;
border-radius:50px;
text-decoration:none;
transition:0.3s;
box-shadow:0 0 30px rgba(0,198,255,0.5);
}
.home-btn:hover{
transform:scale(1.08);
box-shadow:0 0 50px rgba(0,198,255,0.9);
}
@media(max-width: 768px){
.error-wrapper h1{
font-size:120px;
}
.error-wrapper h2{
font-size:32px;
}
}
@media(max-width: 480px){
.error-wrapper h1{
font-size:100px;
}
.error-wrapper h2{
font-size:28px;
}
.error-wrapper p{
font-size:19px;
}
}
</style>
</head>
<body>
<div class="error-wrapper">
    <h1>404</h1>
    <h2>Страница не найдена</h2>
    <p id="random-message">Упс! Кажется, вы забрели туда, где даже Grim VPN не может вас защитить.</p>
    <a href="index" class="home-btn">Вернуться на главную</a>
</div>

<script>
const messages = [
    "Упс! Страница, которую вы ищете, не существует или была перемещена.",
    "Упс! Кажется, вы в неизвестной части интернета.",
    "Упс! Похоже, страница потерялась в цифровых джунглях.",
    "Упс! Кажется, эта страница заблудилась.",
    "Упс! Страница растворилась в тумане."
];

function setRandomMessage() {
    const randomIndex = Math.floor(Math.random() * messages.length);
    const messageElement = document.getElementById('random-message');
    messageElement.textContent = messages[randomIndex];
}

window.onload = setRandomMessage;
</script>
</body>
</html>
